[server]
address = "localhost"
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = true
# Limit upload size to 50 MB (DoS mitigation)
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#7C5CFF"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B26"
textColor = "#E6E8EE"
font = "sans serif"

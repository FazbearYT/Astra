# Конфигурация для Iris Dataset

dataset:
  name: "Iris"
  type: "tabular"
  source: "sklearn"

data:
  test_size: 0.2
  random_state: 42
  stratify: true

models:
  types:
    - "random_forest"
    - "svm"
    - "gradient_boosting"
    - "neural_network"
    - "logistic_regression"

  params:
    random_forest:
      n_estimators: 100
      max_depth: 10
      random_state: 42

    svm:
      kernel: "rbf"
      probability: true
      random_state: 42

    gradient_boosting:
      n_estimators: 100
      max_depth: 5
      learning_rate: 0.1

    neural_network:
      hidden_layer_sizes: [100, 50]
      max_iter: 1000

    logistic_regression:
      max_iter: 1000
      random_state: 42

training:
  cv_folds: 5
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"

output:
  models_dir: "models/iris_models"
  profile_path: "models/iris_profile.json"
  visualization_path: "models/iris_profile_visualization.png"